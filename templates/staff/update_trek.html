{% extends "base.html" %}
{% block title %}Update Trek{% endblock %}
{% block content %}
<h3 class="mb-3">Update: {{ trek.name }}</h3>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Available Slots</label>
    <input type="number" name="available_slots" class="form-control"
           value="{{ trek.available_slots }}" min="0" max="{{ trek.total_slots }}" required>
    <div class="form-text">Total slots: {{ trek.total_slots }}</div>
  </div>
  <div class="mb-3">
    <label class="form-label">Trek Status</label>
    <select name="status" class="form-select">
      {% for s in ["Approved", "Open", "Closed", "Completed"] %}
        <option value="{{ s }}" {{ "selected" if trek.status == s else "" }}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn btn-success">Save Changes</button>
  <a href="{{ url_for('staff.dashboard') }}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
