{% extends "base.html" %}
{% block title %}{{ "Edit Trek" if trek else "New Trek" }}{% endblock %}
{% block content %}
<h3>{{ "Edit Trek" if trek else "New Trek" }}</h3>

<form method="POST">
  <div class="mb-3">
    <label class="form-label">Trek Name</label>
    <input type="text" name="name" class="form-control" value="{{ trek.name if trek else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Location</label>
    <input type="text" name="location" class="form-control" value="{{ trek.location if trek else '' }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Difficulty</label>
    <select name="difficulty" class="form-select">
      {% for d in ["Easy", "Moderate", "Hard"] %}
        <option value="{{ d }}" {{ "selected" if trek and trek.difficulty == d else "" }}>{{ d }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label">Total Slots</label>
    <input type="number" name="total_slots" class="form-control" value="{{ trek.total_slots if trek else '' }}" required>
  </div>
  {% if trek %}
  <div class="mb-3">
    <label class="form-label">Status</label>
    <select name="status" class="form-select">
      {% for s in ["Pending", "Approved", "Open", "Closed", "Completed"] %}
        <option value="{{ s }}" {{ "selected" if trek.status == s else "" }}>{{ s }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}
  <div class="mb-3">
    <label class="form-label">Start Date</label>
    <input type="date" name="start_date" class="form-control" value="{{ trek.start_date if trek else '' }}">
  </div>
  <div class="mb-3">
    <label class="form-label">End Date</label>
    <input type="date" name="end_date" class="form-control" value="{{ trek.end_date if trek else '' }}">
  </div>
  <button type="submit" class="btn btn-success">{{ "Save Changes" if trek else "Create Trek" }}</button>
</form>
{% endblock %}
