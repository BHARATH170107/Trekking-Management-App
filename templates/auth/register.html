{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title mb-3">Register</h4>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contact Number</label>
            <input type="text" name="contact" class="form-control">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Register as</label>
            <select name="role" class="form-select" required>
              <option value="trekker">Trekker (User)</option>
              <option value="staff">Trek Staff</option>
            </select>
            <div class="form-text">Staff accounts need admin approval before login.</div>
          </div>
          <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <p class="mt-3 mb-0 text-center">
          Already have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
